name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:
  pull_request:
    types: [
        synchronize, # PR was updated
        opened, # PR was open
        reopened, # PR was reopened
      ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || format('{0}-{1}', github.ref, github.run_number) }}
  cancel-in-progress: true

jobs:
  ruby-3:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.4", "4.0"]
        elasticsearch: [8, 9]
        gemfile: [rails.7.2.activerecord, rails.8.0.activerecord, rails.8.1.activerecord]
    name: ${{ matrix.ruby }}-${{ matrix.gemfile }}-${{ matrix.elasticsearch }}

    env:
      BUNDLE_GEMFILE: gemfiles/${{ matrix.gemfile }}.gemfile
      ES_MAJOR: ${{ matrix.elasticsearch }}

    services:
      redis:
        # Docker Hub image
        image: redis
        ports:
          - "6379:6379"
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Start containers
        run: |
          docker compose up elasticsearch_${{ matrix.elasticsearch }} -d --wait

      - name: Get Elasticsearch status
        run: |
          curl -s http://localhost:9250

      - name: Tests
        run: bundle exec rspec --format progress --format RSpec::Github::Formatter

  rubocop:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true
      - run: bundle exec rubocop --format simple
